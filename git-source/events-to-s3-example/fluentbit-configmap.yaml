apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-webhook
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Log_Level    info
        Parsers_File parsers.conf

    [INPUT]
        Name              http
        Listen            0.0.0.0
        Port              9880
        Tag               webhook
        buffer_max_size   1M
        buffer_chunk_size 64K

    [OUTPUT]
        Name                s3
        Match               *
        region              us-east-1
        bucket              gitea-events
        endpoint            http://blobs-versitygw.ystack.svc.cluster.local
        s3_key_format       /events/%Y/%m/%d/%H%M%S/$UUID.json
        use_put_object      On
        upload_timeout      15s
        total_file_size     1M
        store_dir           /tmp/fluent-bit/s3
        tls                 Off
  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
  envoy.yaml: |
    static_resources:
      listeners:
      - name: webhook_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: webhook
              codec_type: HTTP1
              route_config:
                name: local_route
                virtual_hosts:
                - name: fluentbit
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: fluentbit_local
                      timeout: 30s
              http_filters:
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  default_source_code:
                    inline_string: |
                      function envoy_on_request(request_handle)
                        local headers = request_handle:headers()
                        local to_remove = {}
                        for key, value in pairs(headers) do
                          if value == "" then
                            table.insert(to_remove, key)
                          end
                        end
                        for _, key in ipairs(to_remove) do
                          headers:remove(key)
                        end
                      end
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: fluentbit_local
        connect_timeout: 5s
        type: STATIC
        load_assignment:
          cluster_name: fluentbit_local
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9880
