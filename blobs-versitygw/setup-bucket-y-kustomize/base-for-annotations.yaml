# This secret reflects the base default endpoint and placeholder credentials.
# A future improvement is to have the inline job script create the secret
# with the actual resolved values (endpoint, consumer credentials).
apiVersion: v1
kind: Secret
metadata:
  name: bucket
stringData:
  endpoint: http://y-s3-api.blobs.svc.cluster.local:9000
  accesskey: YstackEXAMPLEKEY
  secretkey: github.com/Yolean/ystack-EXAMPLE
---
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-bucket
  labels:
    yolean.se/converge-mode: replace
spec:
  template:
    metadata:
      annotations:
        yolean.se/bucket-name: ""
    spec:
      nodeSelector:
        yolean.se/cluster: local
      containers:
      - name: mc
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: versitygw-server
              key: root-accesskey
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: versitygw-server
              key: root-secretkey
        - name: BUCKET_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/bucket-name']
        - name: S3_ENDPOINT
          value: http://y-s3-api.blobs.svc.cluster.local:9000
        command:
        - sh
        - -ce
        - |
          until mc alias set s3 $S3_ENDPOINT $AWS_ACCESS_KEY_ID $AWS_SECRET_ACCESS_KEY 2>/dev/null; do
            sleep 2
          done
          mc mb --ignore-existing s3/$BUCKET_NAME
      restartPolicy: Never
  backoffLimit: 10
