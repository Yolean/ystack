version: 0.1
log:
  fields:
    service: registry
storage:
  s3:
    region: us-east-1
  # bucket, credentials, endpoint override via REGISTRY_STORAGE_S3_* env vars
  cache:
    blobdescriptor: inmemory
  maintenance:
    uploadpurging:
      enabled: false
  redirect:
    disable: true
http:
  headers:
    X-Content-Type-Options: [nosniff]
  debug:
    addr: 0.0.0.0:5001
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
