# yaml-language-server: $schema=https://raw.githubusercontent.com/Yolean/y-cluster/main/pkg/provision/schema/qemu.schema.json
#
# Local development cluster on the qemu provider.
# y-cluster's defaults forward 6443/80/443. Port 8944 is intentionally
# NOT forwarded: the acceptance test runs `y-cluster serve` on the host
# bound to 127.0.0.1:8944. Forwarding the cluster's :8944 too would
# conflict with the host-local serve binding the same port.
provider: qemu
context: local
name: local
