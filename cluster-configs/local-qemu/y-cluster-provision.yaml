# yaml-language-server: $schema=https://raw.githubusercontent.com/Yolean/y-cluster/main/pkg/provision/schema/qemu.schema.json
#
# Local development cluster on the qemu provider.
# y-cluster's defaults forward 6443/80/443. Port 8944 is intentionally
# NOT forwarded: the acceptance test runs `y-cluster serve` on the host
# bound to 127.0.0.1:8944. Forwarding the cluster's :8944 too would
# conflict with the host-local serve binding the same port.
provider: qemu
context: local
name: local

# Mirror in-cluster registry hostnames at the magic ClusterIPs that
# k3s/{60-builds-registry,61-prod-registry}/*-magic-numbers.yaml pin
# (and that y-cluster-validate-ystack asserts as `*-registry clusterIP`
# checks). Without these mirrors, containerd on the node can't resolve
# *.svc.cluster.local at image-pull time -- pods that reference
# prod-registry.ystack.svc.cluster.local/yolean/... would hit
# ImagePullBackOff. ystack's own acceptance pulls only via the kubectl
# API proxy and via in-cluster buildkit, so the gap is invisible here;
# checkit and any real-workload consumer needs this.
registries:
  mirrors:
    builds-registry.ystack.svc.cluster.local:
      endpoint:
      - http://10.43.0.50
    prod-registry.ystack.svc.cluster.local:
      endpoint:
      - http://10.43.0.51
