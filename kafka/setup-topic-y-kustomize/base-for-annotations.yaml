# yaml-language-server: $schema=https://github.com/yannh/kubernetes-json-schema/raw/master/v1.30.7/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-topic
  labels:
    yolean.se/converge-mode: replace
spec:
  template:
    metadata:
      annotations:
        yolean.se/kafka-bootstrap: y-bootstrap.kafka.svc.cluster.local:9092
        yolean.se/kafka-topic-name: ""
        yolean.se/kafka-topic-config: >-
          max.message.bytes=524288
          retention.bytes=-1
          retention.ms=-1
        yolean.se/kafka-topic-partitions: "1"
        yolean.se/kafka-topic-replicas: "-1"
        yolean.se/kafka-secret-name: ""
        yolean.se/setup-job-version: "1"
    spec:
      nodeSelector:
        yolean.se/cluster: local
      serviceAccountName: setup-topic
      restartPolicy: Never
      activeDeadlineSeconds: 3600
      containers:
      - name: topic
        image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
        args:
        - |
          [ -n "$KAFKA_BOOTSTRAP" ] || exit 1
          [ -n "$TOPIC_NAME" ] || exit 1
          [ -n "$TOPIC_CONFIG" ] || exit 1
          function config_args {
            FLAG=$1
            for C in $TOPIC_CONFIG; do echo -n " $FLAG $C"; done
            echo ''
          }
          until rpk cluster --brokers $KAFKA_BOOTSTRAP info -b -c; do sleep 1; done;
          if rpk topic --brokers $KAFKA_BOOTSTRAP describe "$TOPIC_NAME"; then
            rpk topic --brokers $KAFKA_BOOTSTRAP alter-config "$TOPIC_NAME" $(config_args --set) | grep OK
          else
            rpk topic --brokers $KAFKA_BOOTSTRAP create "$TOPIC_NAME" --partitions "$TOPIC_PARTITIONS" --replicas "$TOPIC_REPLICAS" $(config_args --topic-config)
          fi
          # Create consumer-facing secret if yolean.se/kafka-secret-name is set
          if [ -n "$SECRET_NAME" ]; then
            KUBE=https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
            CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            SECRET_JSON=$(cat <<EOJSON
          {
            "apiVersion": "v1",
            "kind": "Secret",
            "metadata": {
              "name": "$SECRET_NAME",
              "labels": {
                "yolean.se/setup-job-type": "kafka",
                "yolean.se/setup-job-version": "$SETUP_JOB_VERSION",
                "yolean.se/setup-job-pod": "$HOSTNAME"
              }
            },
            "stringData": {
              "bootstrap": "$KAFKA_BOOTSTRAP",
              "topicName": "$TOPIC_NAME"
            }
          }
          EOJSON
            )
            # Try create, fall back to update if it exists
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$KUBE/api/v1/namespaces/$NS/secrets" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" --cacert "$CA" -d "$SECRET_JSON")
            if [ "$STATUS" = "409" ]; then
              curl -sf -X PUT "$KUBE/api/v1/namespaces/$NS/secrets/$SECRET_NAME" \
                -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" --cacert "$CA" -d "$SECRET_JSON"
            elif [ "$STATUS" != "201" ]; then
              echo "ERROR: failed to create secret $SECRET_NAME (HTTP $STATUS)" >&2
              exit 1
            fi
            echo "Secret $SECRET_NAME created/updated with bootstrap=$KAFKA_BOOTSTRAP topicName=$TOPIC_NAME"
          fi
        command:
        - /bin/bash
        - -cex
        env:
        - name: KAFKA_BOOTSTRAP
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-bootstrap']
        - name: TOPIC_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-topic-name']
        - name: TOPIC_CONFIG
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-topic-config']
        - name: TOPIC_PARTITIONS
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-topic-partitions']
        - name: TOPIC_REPLICAS
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-topic-replicas']
        - name: SECRET_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/kafka-secret-name']
        - name: SETUP_JOB_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['yolean.se/setup-job-version']
        resources:
          requests:
            cpu: 250m
            memory: 100Mi
          limits:
            memory: 100Mi
  backoffLimit: 10
