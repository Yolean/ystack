# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Produces a Secret y-kustomize.kafka.setup-topic-prep whose data key
# base-for-annotations.yaml is a manifest list (ServiceAccount + Role +
# RoleBinding) for the setup-topic Job's per-namespace prerequisites.
# y-cluster serve picks up this Secret and serves it at
# /v1/kafka/setup-topic-prep/base-for-annotations.yaml.
secretGenerator:
- name: y-kustomize.kafka.setup-topic-prep
  options:
    disableNameSuffixHash: true
    labels:
      yolean.se/module-part: y-kustomize
  files:
  - base-for-annotations.yaml
