apiVersion: v1
kind: Service
metadata:
  name: y-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: redpanda
    app.kubernetes.io/component: redpanda-statefulset
  ports:
  - name: kafka
    port: 9092
    targetPort: 9092
