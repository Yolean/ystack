apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
- ../rbac-prometheus
- now-prometheus-service.yaml
- now-prometheus.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: prometheus-now-config
  files:
  - prometheus.yml
- name: prometheus-now-rules
  files:
  - rules/node-exporter.yml
